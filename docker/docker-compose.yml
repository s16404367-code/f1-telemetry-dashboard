version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
  openf1:
    image: ghcr.io/openf1/openf1:latest
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017/openf1
      - PORT=3000
      - CORS_ALLOWED_ORIGINS=*
    ports:
      - "3000:3000"
    depends_on:
      - mongo
volumes:
  mongo-data:
